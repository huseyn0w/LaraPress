; LaraPress CMS - LOCAL DEV PHP overrides (not used in production).
; Mounted into the app container at conf.d/zz-larapress.ini.
; Sized for the file manager / media uploads.

memory_limit = 256M
max_execution_time = 120
max_input_time = 120

upload_max_filesize = 64M
post_max_size = 64M

; Keep timezone explicit for predictable local behaviour.
date.timezone = UTC
