# Cmstack-Laravel - LOCAL DEV nginx config (not used in production).
# Standard Laravel front-controller setup. FastCGI passes to the `app`
# php-fpm service on port 9000 (see docker-compose.yml).

server {
    listen 80;
    server_name localhost;

    root /var/www/html/public;
    index index.php index.html;

    charset utf-8;

    # Sized for the file manager / media uploads (php.ini matches this).
    client_max_body_size 64M;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    # NOTE: robots.txt is served dynamically by Laravel (SeoController), so it is
    # intentionally NOT given a static-file location here — it must fall through
    # to the location / try_files -> index.php route.

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        include fastcgi_params;
        fastcgi_read_timeout 300;
    }

    # Deny access to hidden files (.env, .git, etc.).
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
