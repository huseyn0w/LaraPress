# =============================================================================
# Laravella CMS - LOCAL DEVELOPMENT stack only.
#
# This file is a developer convenience. It is NOT used in production.
# Production runs on Hostinger (traditional PHP-FPM hosting) without Docker.
#
# Quick start:
#   cp .env.example .env          # then set DB_HOST=mysql (see .env.example note)
#   docker compose up -d
#   docker compose exec app composer install
#   docker compose exec app php artisan key:generate
#   docker compose exec app php artisan migrate --seed
#   # App: http://localhost:8080   Mailpit UI: http://localhost:8025
#
# All values are .env-driven with sane local defaults; no secrets are hardcoded.
# =============================================================================

services:
  # ---- PHP-FPM application container ----------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    image: laravella-app:local
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/zz-laravella.ini:ro
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - laravella

  # ---- Nginx web server ------------------------------------------------------
  web:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8080}:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - laravella

  # ---- MySQL 8 database (matches Hostinger's default DB engine) --------------
  mysql:
    image: mysql:8
    restart: unless-stopped
    ports:
      # Published on 33060 by default to avoid clashing with a host MySQL on 3306.
      - "${DB_FORWARD_PORT:-33060}:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-laravel}
      MYSQL_USER: ${DB_USERNAME:-laravel}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_ROOT_PASSWORD:-rootsecret}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - laravella

  # ---- Vite dev server (OPTIONAL) -------------------------------------------
  # Provides HMR during local dev. Start explicitly with:
  #   docker compose --profile dev up node
  # Or run Vite on the host instead (npm install && npm run dev). For a static
  # local site you can simply `npm run build` once and skip this service.
  node:
    image: node:22-alpine
    profiles: ["dev"]
    working_dir: /var/www/html
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "${VITE_PORT:-5173}:5173"
    volumes:
      - ./:/var/www/html
    networks:
      - laravella

  # ---- Mailpit (OPTIONAL) - catches local outgoing mail ----------------------
  # Start with the stack, or only when needed via the `mail` profile:
  #   docker compose --profile mail up -d mailpit
  # Point .env at it: MAIL_MAILER=smtp MAIL_HOST=mailpit MAIL_PORT=1025
  mailpit:
    image: axllent/mailpit:latest
    profiles: ["mail"]
    restart: unless-stopped
    ports:
      - "${MAILPIT_UI_PORT:-8025}:8025"   # Web UI
      - "${MAILPIT_SMTP_PORT:-1025}:1025" # SMTP
    networks:
      - laravella

volumes:
  mysql-data:
    driver: local

networks:
  laravella:
    driver: bridge
